<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GARCH模型套保分析平台{% endblock %}</title>
    <!-- 添加缓存破坏参数 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ config.SECRET_KEY[:8] if config.SECRET_KEY else '1' }}">
</head>
<body>
    <div class="container">
        <h1>GARCH模型套保分析平台</h1>
        <nav style="display: flex; gap: 12px; justify-content: center; margin-bottom: 30px;">
            <a href="/" style="padding: 8px 20px; background-color: #3498db; color: #fff; border-radius: 4px; text-decoration: none; font-size: 14px;">GARCH 套保</a>
            <a href="/spread" style="padding: 8px 20px; background-color: #3498db; color: #fff; border-radius: 4px; text-decoration: none; font-size: 14px;">价差套利</a>
            <a href="/quick-signal" style="padding: 8px 20px; background-color: #e67e22; color: #fff; border-radius: 4px; text-decoration: none; font-size: 14px;">快速信号</a>
        </nav>

        {% block content %}{% endblock %}

        <footer style="text-align: center; margin-top: 50px; color: #7f8c8d; font-size: 14px;">
            <p>GARCH套保策略分析系统 v1.0</p>
        </footer>
    </div>

    <!-- 添加缓存破坏参数到脚本 -->
    <script src="{{ url_for('static', filename='js/app.js') }}?v=skip-rows-{{ config.SECRET_KEY[:4] if config.SECRET_KEY else '1' }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
